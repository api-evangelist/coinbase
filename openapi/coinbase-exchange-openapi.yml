            - withdraw
        created_at:
          type: string
          format: date-time
          description: When the transfer was created
        completed_at:
          type: string
          format: date-time
          description: When the transfer completed
        amount:
          type: string
          description: Transfer amount
        details:
          type: object
          description: Additional transfer details
    Order:
      type: object
      description: A trading order on the exchange
      properties:
        id:
          type: string
          description: Order identifier
        product_id:
          type: string
          description: Trading pair
        side:
          type: string
          description: Order side
          enum:
            - buy
            - sell
        type:
          type: string
          description: Order type
          enum:
            - market
            - limit
            - stop
        size:
          type: string
          description: Order size in base currency
        price:
          type: string
          description: Order price (for limit orders)
        status:
          type: string
          description: Order status
          enum:
            - open
            - pending
            - active
            - done
            - rejected
        filled_size:
          type: string
          description: Filled size
        fill_fees:
          type: string
          description: Total fill fees
        executed_value:
          type: string
          description: Total executed value
        created_at:
          type: string
          format: date-time
          description: When the order was created
        done_at:
          type: string
          format: date-time
          description: When the order completed
        done_reason:
          type: string
          description: Reason the order completed
        time_in_force:
          type: string
          description: Time in force policy
          enum:
            - GTC
            - GTT
            - IOC
            - FOK
